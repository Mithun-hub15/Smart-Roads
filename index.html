<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Road - Secure Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
    }
    
    * { box-sizing: border-box; }

    body { 
      /* Smart Road / City Highway background with a dark overlay */
      background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.9)),
                  url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover fixed;
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* Glassmorphism Effect */
    .login-box { 
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 48px 40px;
      border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border);
    }

    .logo-container {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: inline-block;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
    }

    h2 { 
      margin: 0; 
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin: 8px 0 0 0;
      font-weight: 400;
    }

    .input-group {
      margin-bottom: 24px;
    }

    label { 
      display: block; 
      margin-bottom: 8px; 
      font-size: 13px; 
      font-weight: 600;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input { 
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .input::placeholder { color: #475569; }

    .input:hover { border-color: rgba(255, 255, 255, 0.2); }

    .input:focus {
      outline: none;
      background: rgba(0, 0, 0, 0.5);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
    }

    .btn { 
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn:hover { 
      background: var(--primary-hover); 
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .error { 
      color: #f87171; 
      margin-top: 20px; 
      font-size: 13px; 
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: none;
      font-weight: 500;
    }

    .error.show { display: block; animation: shake 0.4s ease-in-out; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <form class="login-box" id="loginForm">
      <div class="logo-container">
        <div class="logo-icon">🛣️</div>
        <h2>Smart Road</h2>
        <p class="subtitle">Secure access portal</p>
      </div>
      
      <div class="input-group">
        <label>Username</label>
        <input id="username" class="input" type="text" required placeholder="Enter your full name" autocomplete="off" />
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <input id="password" class="input" type="password" required placeholder="e.g., 2005" />
      </div>
      
      <button type="submit" class="btn">Authenticate</button>
      <div id="error" class="error"></div>
    </form>
  </div>
  
  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorDiv = document.getElementById("error");
      
      errorDiv.classList.remove("show");
      
      if (!username || !password) {
        errorDiv.textContent = "Please fill all fields";
        errorDiv.classList.add("show");
        return;
      }
      
      const btn = document.querySelector(".btn");
      const originalText = btn.textContent;
      btn.textContent = 'Authenticating...';
      btn.disabled = true;
      
      try {
        const res = await fetch('http://localhost:3300/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          btn.style.background = '#10b981';
          btn.textContent = 'Access Granted';
          
          localStorage.setItem('username', username);
          localStorage.setItem('userType', data.type || 'user');
          
          setTimeout(() => {
            window.location.href = data.type === 'admin' ? 'admin.html' : 'user.html';
          }, 600);
        } else {
          errorDiv.textContent = data.message || "Authentication failed";
          errorDiv.classList.add("show");
          btn.textContent = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        errorDiv.textContent = "Unable to connect to server";
        errorDiv.classList.add("show");
        btn.textContent = originalText;
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
