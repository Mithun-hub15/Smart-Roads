<!DOCTYPE html>
<html>
<head>
  <title>Smart Road</title>
  <style>
    body { 
      background: linear-gradient(rgba(32,40,105,0.85), rgba(32,40,105,0.85)), 
       url('https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/images/98928811/d1907ad6-330e-4635-8187-45f8eb22d3c7/image.jpg') center/cover fixed;
      color: #ffe170;
      font-family: Arial;
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box { 
      background: rgba(37,46,79,0.95);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    h2 { color: #ffd357; margin: 0 0 20px; text-align: center; }
    label { display: block; margin: 15px 0 5px; font-size: 14px; }
    .input { 
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 15px;
      background: #232356;
      color: #fff;
      box-sizing: border-box;
    }
    .btn { 
      background: #22aaf9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }
    .btn:hover { background: #1266ba; }
    .error { color: #ff8181; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <form class="login-box" id="loginForm" style="min-width:320px;">
    <h2>🛣️ Smart Road</h2>
    <label>Username</label>
    <input id="username" class="input" type="text" required placeholder="Enter your name" />
    <label>Password (Birth Year)</label>
    <input id="password" class="input" type="password" required placeholder="e.g., 2005" />
    <button type="submit" class="btn">Login</button>
    <div id="error" class="error"></div>
  </form>
  
  <script>
    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      
      if (!username || !password) {
        document.getElementById("error").textContent = "Please fill all fields";
        return;
      }
      
      try {
        const res = await fetch('http://localhost:3300/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('username', username);
          localStorage.setItem('userType', data.type || 'user');
          window.location.href = data.type === 'admin' ? 'admin.html' : 'user.html';
        } else {
          document.getElementById("error").textContent = data.message || "Login failed";
        }
      } catch (err) {
        document.getElementById("error").textContent = "Server error. Check if server is running.";
      }
    };
  </script>
</body>
</html>
